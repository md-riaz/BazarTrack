name: bazar
description: "সহজ বাজার খাতা — collaborative office market and expense manager."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  go_router: ^14.6.3

  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.5
  path: ^1.9.1

  dio: ^5.7.0
  retrofit: 4.4.2
  pretty_dio_logger: ^1.4.0

  connectivity_plus: ^6.1.0

  flutter_secure_storage: ^9.2.2

  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1

  intl: ^0.19.0

  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7
  uuid: ^4.5.1
  collection: ^1.19.1
  crypto: ^3.0.6

  flutter_svg: ^2.0.16
  shimmer: ^3.0.0
  lottie: ^3.2.0
  gap: ^3.0.1
  percent_indicator: ^4.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  drift_dev: ^2.21.0
  retrofit_generator: 9.1.7
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  fake_async: ^1.3.2

flutter:
  uses-material-design: true
  assets:
    - assets/spec.pdf
    - assets/prototype.jsx
    - assets/images/
    - assets/animations/
